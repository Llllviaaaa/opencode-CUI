server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: ai-gateway

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_AI_GATEWAY_DB:ai_gateway}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: Root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: 
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.opencode.cui.gateway.model
  configuration:
    map-underscore-to-camel-case: true

# Gateway custom configuration
gateway:
  instance-id: ${GATEWAY_INSTANCE_ID:${HOSTNAME:gateway-local}}
  snowflake:
    epoch-ms: ${GATEWAY_SNOWFLAKE_EPOCH_MS:1735689600000}
    service-code: ${GATEWAY_SNOWFLAKE_SERVICE_CODE:2}
    worker-id: ${GATEWAY_SNOWFLAKE_WORKER_ID:1}
    service-bits: ${GATEWAY_SNOWFLAKE_SERVICE_BITS:4}
    worker-bits: ${GATEWAY_SNOWFLAKE_WORKER_BITS:10}
    sequence-bits: ${GATEWAY_SNOWFLAKE_SEQUENCE_BITS:12}
    clock-backwards-strategy: ${GATEWAY_SNOWFLAKE_CLOCK_BACKWARDS_STRATEGY:WAIT}
    max-backward-ms: ${GATEWAY_SNOWFLAKE_MAX_BACKWARD_MS:5}

  relay:
    # TTL for the gw:pending:{ak} downlink buffer queue (Phase 1.6)
    pending-ttl-seconds: ${GATEWAY_PENDING_TTL_SECONDS:60}

  # Legacy relay fallback: 兼容不带 instanceId 的旧版 Source 服务
  # 生产环境全量升级后设为 false 以禁用旧版路由
  legacy-relay:
    enabled: ${GATEWAY_LEGACY_RELAY_ENABLED:true}

  skill-relay:
    owner-heartbeat-interval-seconds: 10
    owner-ttl-seconds: 30
    session-route-ttl-seconds: 1800

  # Agent heartbeat timeout
  agent:
    heartbeat-timeout-seconds: 90
    heartbeat-check-interval-seconds: 30

  # AK/SK auth
  auth:
    # 验签模式: gateway=本地HMAC-SHA256验签(ak_sk_credential表), remote=外部API验签
    mode: ${AUTH_MODE:gateway}
    timestamp-tolerance-seconds: 300
    nonce-ttl-seconds: 300
    identity-api:
      base-url: ${IDENTITY_API_BASE_URL:}
      bearer-token: ${IDENTITY_API_BEARER_TOKEN:}
      timeout-ms: ${IDENTITY_API_TIMEOUT_MS:3000}
    # 认证缓存
    identity-cache:
      l1-ttl-seconds: ${AUTH_CACHE_L1_TTL:300}
      l1-max-size: ${AUTH_CACHE_L1_MAX_SIZE:10000}
      l2-ttl-seconds: ${AUTH_CACHE_L2_TTL:3600}

  # Internal HTTP API for Skill Server to discover GW instances (new routing design)
  internal-api:
    enabled: ${GATEWAY_INTERNAL_API_ENABLED:true}

  websocket:
    max-text-message-buffer-size-bytes: 1048576

  # 助手账号解析（IM 推送安全校验用）
  assistant-resolve:
    api-url: ${ASSISTANT_RESOLVE_URL:http://localhost:9999/assistant-api/integration/v4-1/we-crew/instance/query}
    bearer-token: ${ASSISTANT_RESOLVE_TOKEN:}
    cache-ttl-seconds: ${ASSISTANT_RESOLVE_CACHE_TTL:300}

  # 云端协议套餐缓存（CloudResponseProfileRegistry 内存 TTL）
  cloud-protocol-profile:
    cache-ttl-ms: ${GW_CLOUD_PROTOCOL_PROFILE_CACHE_TTL_MS:300000}

  # 云端连接超时配置
  cloud:
    connect-timeout-seconds: ${CLOUD_CONNECT_TIMEOUT:30}
    # 助手广场集成 token（生产环境从 secret manager 注入）
    assistant-square:
      integration-token: ${GW_ASSISTANT_SQUARE_INTEGRATION_TOKEN:}
    first-event-timeout-seconds: ${CLOUD_FIRST_EVENT_TIMEOUT:120}
    idle-timeout-seconds: ${CLOUD_IDLE_TIMEOUT:90}
    # 单轮对话最大总时长（秒）：30min，覆盖用户思考 q_r/p_r 期间的保活窗口
    max-duration-seconds: ${CLOUD_MAX_DURATION:1800}
    # WebHook POST 总超时（秒）
    webhook-timeout-seconds: ${CLOUD_WEBHOOK_TIMEOUT:10}
    sse:
      idle-timeout-seconds: ${CLOUD_SSE_IDLE_TIMEOUT:90}
    websocket:
      idle-timeout-seconds: ${CLOUD_WS_IDLE_TIMEOUT:60}
      ping-interval-seconds: ${CLOUD_WS_PING_INTERVAL:30}

  # 云端路由信息查询
  # v1/v2 切换由 SS SysConfig 控制（cloud_route.v2_enabled），GW 通过 skill-server 接口查询
  cloud-route:
    # v1 旧接口（按 ak 单维度）
    api-url: ${CLOUD_ROUTE_API_URL:http://localhost:9999/appstore/wecodeapi/open/ak/info}
    bearer-token: ${CLOUD_ROUTE_BEARER_TOKEN:}
    cache-ttl-seconds: ${CLOUD_ROUTE_CACHE_TTL_SECONDS:300}
    # GW 端 in-memory 缓存 SS SysConfig（v1/v2 开关、fallback 总开关、SysConfig 兜底模板）的 TTL
    # CallbackConfigService 与 SysConfigFallbackProvider 共用此值，保持 in-memory 失效语义对齐
    sysconfig-cache-ttl-ms: ${GW_SYSCONFIG_CACHE_TTL_MS:300000}
    # v2 新接口（POST /gateway/callbacks/config，按 (ak, scope) 双维度）
    v2-api-url: ${GW_CLOUD_CALLBACK_CONFIG_URL:http://localhost:9999/gateway/callbacks/config}
    v2-bearer-token: ${GW_CLOUD_CALLBACK_BEARER:}

  # skill-server SysConfig 客户端（用于跨服务读取 cloud_route.v2_enabled 等开关）
  skill-server:
    api-base: ${SKILL_SERVER_API_BASE:http://localhost:8082}
    api-token: ${SKILL_SERVER_API_TOKEN:e2e-test-token}

skill:
  gateway:
    internal-token: ${SKILL_SERVER_INTERNAL_TOKEN:changeme}

opencode:
  logging:
    base-dir: ${OPENCODE_LOG_DIR:D:/02_Lab/Logs}
    file: ${AI_GATEWAY_LOG_FILE:${opencode.logging.base-dir}/ai-gateway/ai-gateway.log}
    archive-dir: ${AI_GATEWAY_LOG_ARCHIVE_DIR:${opencode.logging.base-dir}/ai-gateway/archive}

logging:
  file:
    name: ${opencode.logging.file}
  level:
    com.opencode.cui.gateway: INFO
    org.springframework.web.socket: INFO
  # pattern 和 rollingpolicy 已迁移到 log4j2-spring.xml
